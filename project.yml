name: ClipboardManager
options:
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: dev.gallev.ClipboardManager
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  ClipboardManager:
    type: application
    platform: macOS
    sources:
      - path: ClipboardManager
        excludes:
          - "**/.DS_Store"
    resources:
      - path: ClipboardManager/Resources/Assets.xcassets
    info:
      path: ClipboardManager/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: Clipboard Manager
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
    entitlements:
      path: ClipboardManager/ClipboardManager.entitlements
      properties:
        com.apple.security.app-sandbox: false
    dependencies:
      - package: KeyboardShortcuts
      - package: GRDB
        product: GRDB
    scheme:
      testTargets:
        - ClipboardManagerTests
      gatherCoverageData: true

  ClipboardManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClipboardManagerTests
    dependencies:
      - target: ClipboardManager
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClipboardManager.app/Contents/MacOS/ClipboardManager"
        GENERATE_INFOPLIST_FILE: YES
